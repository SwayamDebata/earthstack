<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Hex grid favicon — works at 16px, 32px, 64px -->
  <g transform="translate(32, 32)">
    <!-- Center hex -->
    <polygon points="0,-14 12,-7 12,7 0,14 -12,7 -12,-7" fill="#0f2840" stroke="#3B82F6" stroke-width="1.5"/>
    <!-- Top hex -->
    <polygon points="0,-28 12,-21 12,-8 0,-14 -12,-8 -12,-21" fill="none" stroke="#1e3a5f" stroke-width="1"/>
    <!-- Top-right hex -->
    <polygon points="12,-7 24,-14 24,0 12,7 0,0 0,-14" fill="none" stroke="#1e3a5f" stroke-width="1"/>
    <!-- Bottom-right hex -->
    <polygon points="12,7 24,0 24,14 12,21 0,14 0,0" fill="#0a1929" stroke="#22D3EE" stroke-width="1" opacity="0.8"/>
    <!-- Bottom hex -->
    <polygon points="0,14 12,7 12,21 0,28 -12,21 -12,7" fill="none" stroke="#1e3a5f" stroke-width="1"/>
    <!-- Bottom-left hex -->
    <polygon points="-12,7 0,0 0,14 -12,21 -24,14 -24,0" fill="#071510" stroke="#10B981" stroke-width="1" opacity="0.7"/>
    <!-- Top-left hex -->
    <polygon points="-12,-7 0,-14 0,0 -12,7 -24,0 -24,-14" fill="none" stroke="#1e3a5f" stroke-width="1"/>
    <!-- AI core -->
    <circle cx="0" cy="0" r="5" fill="#050816" stroke="#3B82F6" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="2.5" fill="#3B82F6"/>
  </g>
</svg>
